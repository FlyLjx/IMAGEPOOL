services:
  postgres:
    image: postgres:16-alpine
    container_name: image-pool-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: imagepool
      POSTGRES_USER: imagepool
      POSTGRES_PASSWORD: imagepool
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imagepool -d imagepool"]
      interval: 5s
      timeout: 5s
      retries: 12

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: image-pool-flaresolverr
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
      LOG_HTML: "false"
      CAPTCHA_SOLVER: none
      TZ: Asia/Shanghai
    shm_size: 2gb

  image-pool:
    image: ${IMAGE_POOL_IMAGE:-ghcr.io/flyljx/imagepool}:${IMAGE_POOL_IMAGE_TAG:-latest}
    container_name: image-pool
    restart: unless-stopped
    ports:
      - "${IMAGE_POOL_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      flaresolverr:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://imagepool:imagepool@postgres:5432/imagepool?sslmode=disable
      TZ: Asia/Shanghai
      IMAGE_POOL_UPDATE_URL: http://image-pool-updater:8080/v1/update
      IMAGE_POOL_UPDATE_TOKEN: ${IMAGE_POOL_UPDATE_TOKEN:-image-pool-update-local-token}
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs

  image-pool-updater:
    image: containrrr/watchtower:1.7.1
    container_name: image-pool-updater
    restart: unless-stopped
    command: --http-api-update --cleanup --label-enable
    environment:
      WATCHTOWER_HTTP_API_TOKEN: ${IMAGE_POOL_UPDATE_TOKEN:-image-pool-update-local-token}
      DOCKER_API_VERSION: "1.40"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
